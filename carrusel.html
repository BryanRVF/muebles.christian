<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Momentos ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #064d26, #1a1a2e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* TÍTULO DE LA PÁGINA */
        .titulo-carrusel {
            text-align: center;
            margin-bottom: 30px;
            color: #ff4d6d;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            text-shadow: 0 0 10px #ff4d6d;
            animation: aparecer 1s ease;
        }

        /* CONTENEDOR DEL CARRUSEL */
        .carrusel-container {
            position: relative;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.3);
            animation: aparecer 1.5s ease;
            background: white; /* Fondo negro para las imágenes que no llenan el espacio */
        }

        .carrusel {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .carrusel-item {
            min-width: 100%;
            position: relative;
            background: white; /* Fondo negro para las imágenes */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carrusel-item img {
            width: 100%;
            height: 500px;
            object-fit: contain; /* CAMBIADO: ahora muestra la imagen completa sin cortar */
            display: block;
            background: white; /* Fondo negro para las áreas vacías */
        }

        /* TEXTO EN MEDIO DE LAS IMÁGENES */
        .texto-medio {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px 30px;
            border-radius: 50px;
            font-size: clamp(1rem, 4vw, 1.5rem);
            text-align: center;
            backdrop-filter: blur(5px);
            border: 2px solid #ff4d6d;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.5);
            animation: latido-texto 2s infinite;
            z-index: 10;
            max-width: 90%;
            white-space: normal;
            word-wrap: break-word;
            pointer-events: none; /* Para que no interfiera con los botones */
        }

        @keyframes latido-texto {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        /* BOTONES DE NAVEGACIÓN */
        .carrusel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 77, 109, 0.8);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 20;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
        }

        .carrusel-btn:hover {
            background: #ff4d6d;
            transform: translateY(-50%) scale(1.1);
        }

        .prev {
            left: 20px;
        }

        .next {
            right: 20px;
        }

        /* INDICADORES */
        .indicadores {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .indicador {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicador.activo {
            background: #ff4d6d;
            transform: scale(1.3);
            box-shadow: 0 0 10px #ff4d6d;
        }

        /* BOTÓN DE VOLVER */
        .btn-volver {
            margin-top: 30px;
            padding: 12px 30px;
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
            border: none;
            cursor: pointer;
            animation: aparecer 2s ease;
        }

        .btn-volver:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff4d6d;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .carrusel-item img {
                height: 400px;
            }
            
            .carrusel-btn {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            
            .texto-medio {
                padding: 15px 20px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .carrusel-item img {
                height: 300px;
            }
            
            .carrusel-btn {
                width: 35px;
                height: 35px;
                font-size: 18px;
            }
            
            .prev {
                left: 10px;
            }
            
            .next {
                right: 10px;
            }
            
            .texto-medio {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <h1 class="titulo-carrusel">💕 Nuestras locuras JUNTOS 💕</h1>
    
    <div class="carrusel-container">
        <div class="carrusel" id="carrusel">
            <!-- IMAGEN 1 con texto -->
            <div class="carrusel-item">
                <img src="6.JPEG" alt="Momento 1">
                <div class="texto-medio">TE AMO ❤️</div>
            </div>
            
            <!-- IMAGEN 2 con texto -->
            <div class="carrusel-item">
                <img src="5.jpeg" alt="Momento 2">
                <div class="texto-medio">TOMANDOME FOTO SIEMPRE  🥰</div>
            </div>
            
            <!-- IMAGEN 3 con texto -->
            <div class="carrusel-item">
                <img src="4.PNG" alt="Momento 3">
                <div class="texto-medio">MI TODO 💫</div>
            </div>
            
            <!-- IMAGEN 4 con texto -->
            <div class="carrusel-item">
                <img src="7.jpeg" alt="Momento 4">
                <div class="texto-medio">DE LA MANO JUNTOS ✨</div>
            </div>
            
            <!-- IMAGEN 5 con texto -->
            <div class="carrusel-item">
                <img src="8.jpeg" alt="Momento 5">
                <div class="texto-medio">NOSOTROS SIEMPRE 💑</div>
            </div>
            
            <!-- IMAGEN 6 con texto (NUEVA) -->
            <div class="carrusel-item">
                <img src="15.jpeg" alt="Momento 6">
                <div class="texto-medio">MI RAZÓN DE SONREÍR 😊</div>
            </div>
            
            <!-- IMAGEN 7 con texto (NUEVA) -->
            <div class="carrusel-item">
                <img src="10.jpeg" alt="Momento 7">
                <div class="texto-medio">TÚ Y YO  💕</div>
            </div>
            
            <!-- IMAGEN 8 con texto (NUEVA) -->
            <div class="carrusel-item">
                <img src="11.jpeg" alt="Momento 8">
                <div class="texto-medio">MI COMPAÑERA DE LOCURAS 🌟</div>
            </div>
            
            <!-- IMAGEN 9 con texto (NUEVA) -->
            <div class="carrusel-item">
                <img src="12.jpeg" alt="Momento 9">
                <div class="texto-medio">LA QUE ROBA MI ALIENTO 💨</div>
            </div>
            
            <!-- IMAGEN 10 con texto (NUEVA) -->
            <div class="carrusel-item">
                <img src="13.png" alt="Momento 10">
                <div class="texto-medio">TE AMO ♾️</div>
            </div>
        </div>
        
        <button class="carrusel-btn prev" onclick="moverSlide(-1)">❮</button>
        <button class="carrusel-btn next" onclick="moverSlide(1)">❯</button>
    </div>
    
    <div class="indicadores" id="indicadores"></div>



    

    <script>
        const carrusel = document.getElementById('carrusel');
        const items = document.querySelectorAll('.carrusel-item');
        const indicadoresContainer = document.getElementById('indicadores');
        let currentIndex = 0;
        
        // Crear indicadores
        items.forEach((_, index) => {
            const indicador = document.createElement('div');
            indicador.classList.add('indicador');
            indicador.onclick = () => irASlide(index);
            indicadoresContainer.appendChild(indicador);
        });
        
        const indicadores = document.querySelectorAll('.indicador');
        
        function actualizarCarrusel() {
            carrusel.style.transform = `translateX(-${currentIndex * 100}%)`;
            
            // Actualizar indicadores
            indicadores.forEach((indicador, index) => {
                if (index === currentIndex) {
                    indicador.classList.add('activo');
                } else {
                    indicador.classList.remove('activo');
                }
            });
        }
        
        function moverSlide(direccion) {
            currentIndex += direccion;
            
            if (currentIndex < 0) {
                currentIndex = items.length - 1;
            } else if (currentIndex >= items.length) {
                currentIndex = 0;
            }
            
            actualizarCarrusel();
        }
        
        function irASlide(index) {
            currentIndex = index;
            actualizarCarrusel();
        }
        
        // Inicializar
        actualizarCarrusel();
        
        
    </script>
</body>
</html>
