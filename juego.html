<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para ti ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: black;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* PORTADA */
        .portada {
            height: 100vh;
            width: 100vw;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* GRID IMÁGENES */
        .grid-imagenes {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0;
            background: black;
        }

        .grid-imagenes img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(1.4) contrast(1.1) saturate(1.2);
            background: black;
        }

        /* CAPA OSCURA */
        .portada::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.5));
            z-index: 1;
        }

        /* CONTENIDO */
        .contenido-portada {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        /* CORAZÓN SVG - COLOR ORIGINAL RESTAURADO */
        .corazon-linea {
            width: 220px;
            margin: 0 auto; /* Centrado horizontal */
            display: block;
            animation: latido 2s infinite;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 15px rgba(4, 105, 58, 0.8));
        }

        .corazon-linea:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 25px #04693a);
        }

        .corazon-linea path {
            pointer-events: all;
            stroke: #04693a; /* COLOR VERDE ORIGINAL RESTAURADO */
            stroke-width: 3;
        }

        .corazon-linea text {
            fill: white;
            font-size: 15px;
            font-weight: bold;
            pointer-events: none;
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* TÍTULO OPCIONAL (comentado por si lo quieres usar después) */
        .contenido-portada h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            margin-bottom: 15px;
            color: #ff4d6d;
            text-shadow: 0 0 10px #20479c, 0 0 20px #ff4d6d, 0 0 40px #ff4d6d;
            animation: aparecer 1.5s ease;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE MÓVIL - CORREGIDO */
        @media (max-width: 768px) {
            body {
                overflow: hidden;
                position: fixed;
            }
            
            .portada {
                height: 100vh;
                width: 100vw;
                overflow: hidden;
            }
            
            .contenido-portada {
                justify-content: center;
                padding: 0 15px;
            }
            
            .corazon-linea {
                width: min(180px, 50vw); /* Tamaño responsive */
                margin: 0 auto;
            }
            
            .grid-imagenes img {
                filter: brightness(1.45) contrast(1.15) saturate(1.25);
            }
        }

        /* MÓVILES MUY PEQUEÑOS */
        @media (max-width: 480px) {
            .corazon-linea {
                width: min(160px, 45vw);
            }
        }

        /* MÓVILES EXTRA PEQUEÑOS */
        @media (max-width: 320px) {
            .corazon-linea {
                width: min(140px, 40vw);
            }
        }

        /* PREVENIR SCROLL EN TODOS LOS DISPOSITIVOS */
        html, body {
            overscroll-behavior: none;
            -webkit-overflow-scrolling: none;
            touch-action: none;
        }

        /* SOPORTE PARA PANTALLAS CON NOTCH */
        @supports (padding: max(0px)) {
            .contenido-portada {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="portada">
        <div class="grid-imagenes">
            <img src="9.jpeg" alt="Corazones">
            <img src="2.png" alt="Romántico">
            <img src="3.png" alt="Amor">
            <img src="1.png" alt="Pareja">
        </div>

        <div class="contenido-portada">
            <svg class="corazon-linea" viewBox="0 0 100 90" onclick="irACarrusel()">
                <path d="M50 80 
                         L20 50 
                         A15 15 0 1 1 50 30 
                         A15 15 0 1 1 80 50 Z"
                      fill="none"
                      stroke="#04693a" /* COLOR VERDE ORIGINAL */
                      stroke-width="3"/>
                <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="white">
                    b & y
                </text>
            </svg>
        </div>
    </div>

    <script>
        function irACarrusel() {
            window.location.href = "carrusel.html";
        }

        // PREVENIR SCROLL EN MÓVIL
        document.body.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // PREVENIR SCROLL CON RUEDA DEL RATÓN
        document.body.addEventListener('wheel', (e) => {
            e.preventDefault();
        }, { passive: false });

        // PREVENIR SCROLL CON TECLADO (flechas)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
