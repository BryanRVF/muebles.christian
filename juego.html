<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Para ti ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: black;
            height: 100dvh; /* dvh es mejor para móviles */
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* PORTADA */
        .portada {
            height: 100dvh;
            width: 100vw;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* GRID IMÁGENES */
        .grid-imagenes {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0;
            background: black;
        }

        .grid-imagenes img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Cambio a cover para que llene el espacio */
            filter: brightness(1.3) contrast(1.1);
            background: black;
        }

        /* CAPA OSCURA - MÁS CLARA PARA VER MEJOR LAS IMÁGENES */
        .portada::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.4));
            z-index: 1;
        }

        /* CONTENIDO */
        .contenido-portada {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 0;
            margin: 0;
        }

        /* CORAZÓN SVG - TAMAÑO GRANDE PARA MÓVIL */
        .corazon-linea {
            width: min(280px, 70vw); /* Más grande en móvil */
            height: auto;
            display: block;
            animation: latido 2s infinite;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 20px #04693a);
            margin: 0 auto;
            position: relative;
            top: -5vh; /* Pequeño ajuste hacia arriba para centrar mejor */
        }

        .corazon-linea:hover {
            transform: scale(1.1);
        }

        .corazon-linea path {
            pointer-events: all;
            stroke: #04693a;
            stroke-width: 3.5; /* Un poco más grueso */
        }

        .corazon-linea text {
            fill: white;
            font-size: 18px; /* Texto más grande */
            font-weight: bold;
            pointer-events: none;
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* RESPONSIVE MÓVIL - CORREGIDO PARA TU VISTA */
        @media (max-width: 768px) {
            body {
                height: 100dvh;
                overflow: hidden;
                position: fixed;
            }
            
            .portada {
                height: 100dvh;
            }
            
            .contenido-portada {
                justify-content: center;
                padding: 0;
            }
            
            .corazon-linea {
                width: min(300px, 75vw); /* Aún más grande en móvil */
                margin: 0 auto;
            }
            
            .grid-imagenes img {
                object-fit: cover; /* Las imágenes llenan el espacio */
                filter: brightness(1.4) contrast(1.1);
            }
        }

        /* MÓVILES PEQUEÑOS */
        @media (max-width: 480px) {
            .corazon-linea {
                width: min(280px, 80vw); /* Proporcional al ancho */
            }
            
            .corazon-linea text {
                font-size: 16px;
            }
        }

        /* MÓVILES MUY PEQUEÑOS */
        @media (max-width: 360px) {
            .corazon-linea {
                width: min(240px, 85vw);
            }
        }

        /* PREVENIR SCROLL */
        html, body {
            overscroll-behavior: none;
            -webkit-overflow-scrolling: none;
            touch-action: pan-y; /* Permitimos solo pan-y muy limitado */
            height: 100%;
            width: 100%;
        }

        /* OCULTAR BARRAS DEL NAVEGADOR */
        html {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        
        html::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        /* AJUSTE PARA PANTALLAS CON NOTCH */
        @supports (padding: max(0px)) {
            .portada {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>
<body>
    <div class="portada">
        <div class="grid-imagenes">
            <img src="9.jpeg" alt="Corazones">
            <img src="2.png" alt="Romántico">
            <img src="3.png" alt="Amor">
            <img src="1.png" alt="Pareja">
        </div>

        <div class="contenido-portada">
            <svg class="corazon-linea" viewBox="0 0 100 90" onclick="irACarrusel()">
                <path d="M50 80 
                         L20 50 
                         A15 15 0 1 1 50 30 
                         A15 15 0 1 1 80 50 Z"
                      fill="none"
                      stroke="#04693a"
                      stroke-width="3.5"/>
                <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="white">
                    b & y
                </text>
            </svg>
        </div>
    </div>

    <script>
        function irACarrusel() {
            window.location.href = "carrusel.html";
        }

        // FORZAR OCULTAR BARRAS DEL NAVEGADOR
        window.addEventListener('load', function() {
            // Scroll forzar a 0
            window.scrollTo(0, 0);
            
            // Prevenir scroll con teclado
            window.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || 
                    e.key === 'ArrowLeft' || e.key === 'ArrowRight' ||
                    e.key === 'PageDown' || e.key === 'PageUp' ||
                    e.key === 'Home' || e.key === 'End') {
                    e.preventDefault();
                }
            });
        });

        // Prevenir scroll táctil
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Prevenir scroll con rueda
        document.body.addEventListener('wheel', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Forzar ocultar barra de direcciones en iOS
        if (navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
            setTimeout(function() {
                window.scrollTo(0, 1);
            }, 0);
        }
    </script>
</body>

</html>
