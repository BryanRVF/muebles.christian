<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: black;
        }

        /* PORTADA */
        .portada {
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* GRID IMÁGENES - AHORA SOLO 4 */
        .grid-imagenes {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columnas en escritorio */
            grid-template-rows: repeat(2, 1fr); /* 2 filas */
            gap: 0;
        }

        .grid-imagenes img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(1.2);
        }

        /* CAPA OSCURA */
        .portada::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.8));
            z-index: 1;
        }

        /* CONTENIDO */
        .contenido-portada {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        /* CORAZÓN SVG */
        .corazon-linea {
            width: 220px;
            margin-bottom: 20px;
            animation: latido 2s infinite;
        }

        .corazon-linea text {
            fill: white;
            font-size: 15px;
            font-weight: bold;
        }

        /* TITULO */
        .contenido-portada h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            margin-bottom: 15px;
            color: #ff4d6d;
            text-shadow: 0 0 10px #20479c, 0 0 20px #ff4d6d, 0 0 40px #ff4d6d;
            animation: aparecer 1.5s ease;
        }


/* CORAZÓN SVG */
.corazon-linea {
    width: 220px;
    margin-bottom: 20px;
    animation: latido 2s infinite;
    cursor: pointer;  /* ← ESTO ES IMPORTANTE */
    transition: transform 0.3s ease;
}

.corazon-linea:hover {
    transform: scale(1.1);
    filter: drop-shadow(0 0 20px #ff4d6d);
}

/* Asegurar que todo el corazón sea clicable */
.corazon-linea path {
    pointer-events: all;
}

.corazon-linea text {
    fill: white;
    font-size: 15px;
    font-weight: bold;
    pointer-events: none;  /* El texto no bloquea el clic */
}






        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* TEXTO */
        .contenido-portada p {
            font-size: clamp(1rem, 3vw, 1.6rem);
            margin-bottom: 30px;
            max-width: 600px;
            line-height: 1.6;
            padding: 0 15px;
        }

        /* RESPONSIVE - se mantiene igual porque ya tenemos 2x2 */
        @media (max-width: 480px) {
            .grid-imagenes {
                grid-template-columns: repeat(2, 1fr); /* 2 columnas en móvil */
                grid-template-rows: repeat(2, 1fr); /* 2 filas en móvil */
            }
            
            .corazon-linea {
                width: 180px;
            }
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>
    <div class="portada">
        <div class="grid-imagenes">
            <!-- SOLO 4 IMÁGENES PRINCIPALES -->
            <img src="9.jpeg" alt="Corazones">
            <img src="2.png" alt="Romántico">
            <img src="3.png" alt="Amor">
            <img src="1.png" alt="Pareja">
        </div>

        <div class="contenido-portada">
           <!-- CORAZÓN DE LÍNEAS - MODIFICADO -->
<svg class="corazon-linea" viewBox="0 0 100 90" onclick="irACarrusel()">
    <path d="M50 80 
             L20 50 
             A15 15 0 1 1 50 30 
             A15 15 0 1 1 80 50 Z"
          fill="none"
          stroke="#04693a"
          stroke-width="3"/>
    <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="white">
        b & y
    </text>
</svg>

         
        </div>
    </div>
</body>
<script>

    function irACarrusel() {
        window.location.href = "carrusel.html";  // Cambia esto por la URL que quieras
    }
</script>

</html>
